name: Sync resources

on:
  schedule:
    - cron: "0 3 * * *" # Run daily at 3 AM UTC
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./postsoma-devlibrary
    steps:
      - uses: actions/checkout@v4
        with:
          # Checkout the root repository (free-programming-books)
          path: .

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: postsoma-devlibrary/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate resources JSON
        run: npm run pipeline:generate

      - name: Run tests
        run: npm run test

      - name: Verify build
        run: npm run build
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: "mock_for_build"
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: "mock_for_build"
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: "mock_for_build"
          NEXT_PUBLIC_FIREBASE_APP_ID: "mock_for_build"

      - name: Commit generated data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: sync programming resources data [skip ci]"
          file_pattern: postsoma-devlibrary/public/data/*.json
