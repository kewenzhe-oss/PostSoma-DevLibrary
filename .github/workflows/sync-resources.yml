name: Sync resources

on:
  schedule:
    - cron: "0 3 * * 0" # Run weekly on Sunday at 3 AM UTC
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate resources JSON
        run: npm run pipeline:generate

      - name: Run tests
        run: npm run test

      - name: Commit generated data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: sync programming resources data [skip ci]"
          file_pattern: public/data/*.json
